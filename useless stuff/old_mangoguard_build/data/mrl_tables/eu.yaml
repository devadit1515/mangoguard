# EU Pesticide Database MRLs for mango
#
# PLACEHOLDER -- numerical values are approximate / illustrative. Pre-CREST-
# submission these must be refreshed from the live EU Pesticide Database:
#   https://ec.europa.eu/food/plant/pesticides/eu-pesticides-database
# Many EU mango MRLs default to the detection-limit floor (0.01 mg/kg) for
# active ingredients not specifically listed.

metadata:
  source: "EU Pesticide Database (PLACEHOLDER -- refresh pre-submission)"
  url: "https://ec.europa.eu/food/plant/pesticides/eu-pesticides-database"
  crop: "Mango"
  accessed: "2026-05-30"
  default_floor_mg_per_kg: 0.01

limits:
  hexaconazole:
    mrl_mg_per_kg: 0.05
  imidacloprid:
    mrl_mg_per_kg: 0.05
  thiamethoxam:
    mrl_mg_per_kg: 0.05
  acetamiprid:
    mrl_mg_per_kg: 0.5
  spinosad:
    mrl_mg_per_kg: 0.1
  azoxystrobin:
    mrl_mg_per_kg: 0.7
  difenoconazole:
    mrl_mg_per_kg: 0.07
  carbendazim:
    mrl_mg_per_kg: 0.5
  mancozeb:
    mrl_mg_per_kg: 2.0
  copper_oxychloride:
    mrl_mg_per_kg: 20.0
  sulphur:
    mrl_mg_per_kg: 50.0
  chlorpyrifos:
    mrl_mg_per_kg: 0.01  # EU floor -- effectively banned
  lambda_cyhalothrin:
    mrl_mg_per_kg: 0.2
  buprofezin:
    mrl_mg_per_kg: 0.7
  flubendiamide:
    mrl_mg_per_kg: 0.4

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mangoguard"
version = "0.0.1"
description = "AI orchard-management & MRL-aware spray-audit system for Indian Alphonso mango growers"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MangoGuard CREST project" }]
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "python-dateutil>=2.9",
    "requests>=2.31",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.4",
    "pre-commit>=3.7",
    "freezegun>=1.5",
]
ml = [
    "torch>=2.2",
    "torchvision>=0.17",
    "scikit-learn>=1.4",
    "xgboost>=2.0",
    "pandas>=2.2",
    "numpy>=1.26",
    "shap>=0.45",
]
geo = [
    "earthengine-api>=0.1.400",
    "geemap>=0.32",
    "rasterio>=1.3",
]
dashboard = [
    "streamlit>=1.34",
    "altair>=5.3",
    "pillow>=10.3",
]
scrape = [
    "playwright>=1.43",
    "selenium>=4.20",
    "beautifulsoup4>=4.12",
    "pdfplumber>=0.11",
    "pymupdf>=1.24",
    "pytesseract>=0.3",
]
llm = [
    "google-generativeai>=0.5",
    "langchain>=0.2",
    "langchain-community>=0.2",
    "chromadb>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mangoguard"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "RET", "PL"]
ignore = [
    "PLR0913",   # too-many-arguments: schema constructors need many
    "UP017",     # datetime.UTC alias: verbose form is grep-friendly + explicit
    "UP042",     # StrEnum: project uses (str, Enum) for explicit multi-inheritance
]

[tool.ruff.lint.isort]
known-first-party = ["mangoguard"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "PLR2004",   # magic values in comparisons: idiomatic in pytest assertions
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
filterwarnings = ["ignore::DeprecationWarning"]

# Pesticide metadata for the MangoGuard recommender ranker (Plan 4 Task 10/11).
#
# Each entry: residue half-life (days), per-acre cost (INR), and per-pathogen
# efficacy in [0,1]. The ranker (Task 11) scores candidates with:
#     log_score = log(efficacy + 1e-6) - log(half_life + 1) - log(cost + 1)
#
# PLACEHOLDER WARNING: half-lives and efficacies are interpolated from
# agronomy literature (Akem 2006; NHB Bulletin 31; ICAR-CISH 2023; PPDB Hertfordshire).
# Costs are 2024 Konkan wholesale-channel approximations. Refresh from primary
# sources (EU PPDB, CIB&RC label dose tables, Maharashtra MSAMB price lists)
# before CREST report submission.
#
# Validation: every active_ingredient here MUST also be in cibrc_mango_registered.csv.
# Test test_metadata_subset_of_cibrc enforces this.

